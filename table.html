<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
        }
        th,td{
            border: 1px solid red;
        }
        .bg-success{
            background-color: rgb(4, 66, 4);
        }
        .bg-primary{
            background-color: rgb(17, 17, 227);
        }
        .w-50{
            width: 50%;
        }
        .mx-auto{
            margin: 10px auto;
        }
        thead{
            background-color: aqua;
        }
        tbody{
            background-color: bisque;
        }
        tfoot{
            background-color: purple;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>SN</th>
            <th>Items</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Apple</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Orange</td>
        </tr>
    </table>

    <hr>

    <table>
        <tr>
            <th colspan="2">Amount</th>
        </tr>
        <tr>
            <th>Rs.</th>
            <th>Paisa</th>
        </tr>
        <tr>
            <td>100</td>
            <td>25</td>
        </tr>
    </table>
    <hr>
    
    <table>
        <tr>
            <th rowspan="2">Country</th>
            <td>Nepal</td>
        </tr>
        <tr>
            <td>India</td>
        </tr>
    </table>

    <hr>
    <table class="w-50 mx-auto">
        <tr class="bg-success">
            <th>SN</th>
            <th>Items</th>
        </tr>
        <tr class="bg-primary">
            <td>1</td>
            <td>Apple</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Orange</td>
        </tr>
    </table>
    <hr>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ram</td>
                <td>KTM</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Table Design</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
