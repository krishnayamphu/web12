<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{box-sizing: border-box;}
        .container{
            width: 400px;
            height: 150px;
            border: 1px solid red;
            margin: 15px auto;
            display: flex;
            flex-wrap: wrap;
        }
    
        .item{
            background-color: green;
            width: 199px;
            padding: 5px 10px;
            color:white;
            height: 30px;
        }
        .item:nth-child(2),.item:nth-child(4){
            background-color: orange;
        }
        .flex-start{align-content: flex-start;}
        .flex-center{align-content: center;}
        .flex-end{align-content: flex-end;}
        .space-between{align-content: space-between;}
        .space-around{align-content: space-around;}
        .space-evenly{align-content: space-evenly;}
       
       
    </style>
</head>
<body>
    <div class="container flex-start">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>

    <div class="container center">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>
    <div class="container flex-end">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>
    <div class="container space-between">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>
    <div class="container space-around">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>
    <div class="container space-evenly">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </div>
    
</body>
</html>
