<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        div {
            background-color: green;
            margin: 2px;
            width: 100px;
            height: 50px;
            display: inline;
        }

        span {
            background-color: red;
            display: block;
        }

        .box {
            height: 100px;
            width: 200px;
            display: inline-block;
        }

        p {
            display: none;
        }
    </style>
</head>

<body>

    <div>box 1</div>
    <div>box2</div>

    <hr>

    <span>Inline 1</span>
    <span>Inline 2</span>

    <hr>

    <div class="box">box 1</div>
    <div class="box">box 2</div>

    <hr>

    <p>Hello world</p>

</body>

</html>
