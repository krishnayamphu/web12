<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{box-sizing: border-box;}
        .container{
            width: 80%;
            height: auto;
            border: 1px solid red;
            margin: 15px auto;
            display: flex;
        }
    
        .item1{
            background-color: green;
            color:white;
            height: 30px;
            padding: 5px 10px;
            order: 3;
        }
        .item2{
            background-color: red;
            color:white;
            height: 30px;
            padding: 5px 10px;
            order: 2;
        }
        .item3{
            background-color: blue;
            color:white;
            height: 30px;
            padding: 5px 10px;
            order: 1;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item1">Item 1</div>
        <div class="item2">Item 2</div>
        <div class="item3">Item 3</div>
    </div>
</body>
</html>
