<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box1 {
            background-color: green;
            width: calc(100% - 60px);
            margin: 15px auto;
        }

        .box2 {
            background-color: green;
            width: min(100%, 1000px);
            margin: 15px auto;
        }
    </style>
</head>

<body>
    <div class="box1">box</div>

    <div class="box2">box</div>

</body>

</html>
