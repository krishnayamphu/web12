<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .text-green {
            color: green;
        }

        .text-red {
            color: tomato;
        }

        .fa-big {
            font-size: 100px;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-user"></i>
    <i class="fa-solid fa-envelope"></i>
    <i class="fa-solid fa-phone"></i>
    <i class="fa-brands fa-youtube"></i>

    <h5>Styling Basics</h5>
    <i class="fa-solid fa-house text-green"></i>
    <i class="fa-solid fa-house text-red"></i>

    <h5>Sizing Icons</h5>
    <p><i class="fa-solid fa-user fa-2xs"></i></p>
    <p><i class="fa-solid fa-user fa-xs"></i></p>
    <p><i class="fa-solid fa-user fa-sm"></i></p>
    <p><i class="fa-solid fa-user"></i> regular</p>
    <p><i class="fa-solid fa-user fa-lg"></i></p>
    <p><i class="fa-solid fa-user fa-xl"></i></p>
    <p><i class="fa-solid fa-user fa-2xl"></i></p>
    <p><i class="fa-solid fa-user fa-big"></i></p>

    <h5>Fixed width icons</h5>
    <!-- vertically aligning icons -->
    <div style="font-size: 2rem;">
        <div><i class="fa-solid fa-skating fa-fw" style="background:DodgerBlue"></i> Skating</div>
        <div><i class="fa-solid fa-skiing fa-fw" style="background:SkyBlue"></i> Skiing</div>
        <div><i class="fa-solid fa-skiing-nordic fa-fw" style="background:DodgerBlue"></i> Nordic Skiing</div>
        <div><i class="fa-solid fa-snowboarding fa-fw" style="background:SkyBlue"></i> Snowboarding</div>
        <div><i class="fa-solid fa-snowplow fa-fw" style="background:DodgerBlue"></i> Snowplow</div>
    </div>

    <h5>Icons in list</h5>
    <ul class="fa-ul">
        <li><span class="fa-li"><i class="fa-solid fa-check-square"></i></span>List icons can</li>
        <li><span class="fa-li"><i class="fa-solid fa-check-square"></i></span>be used to</li>
        <li><span class="fa-li"><i class="fa-solid fa-spinner fa-pulse"></i></span>replace bullets</li>
        <li><span class="fa-li"><i class="fa-regular fa-square"></i></span>in lists</li>
    </ul>

    <h5>Rotate Icons</h5>
    <div class="fa-3x">
        <i class="fa-solid fa-snowboarding"></i>
        <i class="fa-solid fa-snowboarding fa-rotate-90"></i>
        <i class="fa-solid fa-snowboarding fa-rotate-180"></i>
        <i class="fa-solid fa-snowboarding fa-rotate-270"></i>
        <i class="fa-solid fa-snowboarding fa-flip-horizontal"></i>
        <i class="fa-solid fa-snowboarding fa-flip-vertical"></i>
        <i class="fa-solid fa-snowboarding fa-flip-both"></i>
    </div>

    <h5>Animating Icons</h5>
    <div class="fa-3x">
        <i class="fa-solid fa-circle-plus fa-beat"></i>
        <i class="fa-solid fa-heart fa-beat"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s;"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 2s;"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-beat-scale: 2.0;"></i>
    </div>

    <div class="fa-3x">
        <i class="fa-solid fa-sync fa-spin"></i>
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <i class="fa-solid fa-cog fa-spin"></i>
        <i class="fa-solid fa-cog fa-spin fa-spin-reverse"></i>
        <i class="fa-solid fa-spinner fa-spin-pulse"></i>
        <i class="fa-solid fa-spinner fa-spin-pulse fa-spin-reverse"></i>
    </div>

    <hr>

    <p><i class="fa-solid fa-envelope"></i> example@email.com</p>
    <p><i class="fa-solid fa-phone"></i> 1234567</p>
    <p><i class="fa-solid fa-building"></i> Patan, Lalitpur</p>

    <button>
        <i class="fa-solid fa-paper-plane"></i> Send
    </button>
    <button>
        <i class="fa-solid fa-user-plus"></i> Add User
    </button>
    <button>
        <i class="fa-solid fa-magnifying-glass"></i> Search
    </button>
    <button><i class="fa-solid fa-trash"></i></button>

    <hr>
    <h5>Brands</h5>
    <button><i class="fa-brands fa-facebook-f"></i></button>
    <button><i class="fa-brands fa-youtube"></i></button>
    <button><i class="fa-brands fa-tiktok"></i></button>






</body>

</html>
