<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        .dropdown {
            background-color: plum;
            display: inline-block;
            margin: 15px;
        }

        .dropdown span {
            display: block;
            padding: 5px 12px;
        }

        .dropdown-menu {
            background-color: #ccc;
            display: none;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            display: block;
            color: #222;
            padding: 2px 5px;
            text-decoration: none;
        }

        .dropdown-menu a:hover {
            background-color: aquamarine;
        }
    </style>
</head>

<body>
    <div class="dropdown">
        <span>Dropdown</span>
        <div class="dropdown-menu">
            <a href="#">Dropdown 1</a>
            <a href="#">Dropdown 2</a>
            <a href="#">Dropdown 3</a>
        </div>
    </div>
</body>

</html>
