<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 100px;
            height: 100px;
        }

        .container {
            width: 300px;
            height: 250px;
            border: 2px solid purple;
            margin: 15px auto;
            position: relative;
        }

        .box1 {
            background-color: red;
            position: absolute;
        }

        .box2 {
            background-color: rgba(0, 0, 255, 1);
            position: absolute;
            top: 50px;
            left: 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1">box1</div>
        <div class="box2">box2</div>
    </div>

</body>

</html>
