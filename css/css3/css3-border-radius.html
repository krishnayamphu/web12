<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    div{
        width: 100px;
        height: 100px;
        background-color: rgb(3, 49, 49);
        float: left;
        margin: 15px;
    }
    .box1{ border-radius: 10px;}
    .box2{ border-radius: 0px 20px;}
    .box3{ border-radius: 30px 30px 0px 30px;}
    .box4{ border-radius: 100px 10px 100px 30px;}
    .box5{ border-radius: 50%;}
    .box6{ border-radius: 0px 0px 50% 50%;}
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
</body>
</html>
