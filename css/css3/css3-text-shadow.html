<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        h1{
            font-family: Arial, Helvetica, sans-serif;
        }
        .shadow-1{
            text-shadow: 2px 2px 2px red;
        }
        .shadow-2{
            text-shadow: -2px -2px 2px rgb(3, 94, 5);
        }
        .shadow-3{
            text-shadow: 0 0 2px rgb(55, 5, 255);
            color:white;
        }
        .shadow-4{
            text-shadow: 2px 2px 2px red,-2px -2px 2px green;
            color:white;
        }
    </style>
</head>
<body>
    <h1 class="shadow-1">HELLO WORLD</h1>
    <h1 class="shadow-2">HELLO WORLD</h1>
    <h1 class="shadow-3">HELLO WORLD</h1>
    <h1 class="shadow-4">HELLO WORLD</h1>
</body>
</html>
