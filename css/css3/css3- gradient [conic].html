<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3-gradient</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            border: 1px solid green;
            float: left;
            margin: 15px;
        }
        .box1{ background-image: conic-gradient(red,green,blue);}
        .box2{ background-image: conic-gradient(red,green,blue,yellow,purple,orange,skyblue);}
        .box3{ background-image: conic-gradient(red 66deg,blue 254deg,yellow 359deg);}
.box4{ background-image: conic-gradient(red 0deg,red 90deg,blue 90deg, blue 180deg,green 180deg, green 270deg,yellow 270deg, yellow 360deg);}
.box5{ background-image: conic-gradient(from 90deg,red,green,yellow);}
.box6{ background-image: conic-gradient(at 40% 40%,red,green,yellow);}
.box7{ background-image: repeating-conic-gradient(red 0%,green 5%,yellow 10%);}

    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
</body>
</html>
