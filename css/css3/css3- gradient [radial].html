<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3-gradient</title>
    <style>
        div{
            width: 200px;
            height: 100px;
            border: 1px solid green;
            float: left;
            margin: 15px;
        }
        .box1{ background-image: radial-gradient(red,blue);}
        .box2{ background-image: radial-gradient(circle,red,blue);}
        .box3{ background-image: radial-gradient(red,yellow,blue);}
        .box4{ background-image: radial-gradient(red,yellow 33%,blue 58%);}
        .box5{ background-image: repeating-radial-gradient(red,yellow 10%,blue 20%);}
        .box6{ background-image: repeating-radial-gradient(circle,red,yellow 10%,blue 20%);}
        

    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
</body>
</html>
