<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        .container {
            position: relative;
            margin: auto;
            height: 150px;
            width: 200px;
            border: 1px solid black;
            perspective: 600px;
            perspective-origin: center top;
        }

        .item {
            padding: 15px;
            position: absolute;
            background-color: red;

        }

        .item:hover {
            transform: rotateY(180deg);
            backface-visibility: hidden;
            transition: all 1s;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">
            Box
        </div>
    </div>
</body>

</html>
