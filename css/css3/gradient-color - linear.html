<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            border: 2px solid red;
            margin: 15px;
            float: left;
        }

        .box1 {
            background-image: linear-gradient(red, blue);
        }

        .box2 {
            background-image: -webkit-linear-gradient(left, red, blue);
        }

        .box3 {
            background-image: -webkit-linear-gradient(top left, red, blue);
        }

        .box4 {
            background-image: linear-gradient(30deg, red, blue);
        }

        .box5 {
            background-image: -webkit-linear-gradient(top left, red, blue, green, yellow, rgb(205, 43, 119));
        }

        .box6 {
            background-image: -webkit-linear-gradient(top left, red, blue 115%);
        }

        .box7 {
            background-image: repeating-linear-gradient(red, white 20%);
        }

        .box8 {
            background-image: linear-gradient(red, rgba(0, 256, 0, 0.5));
        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    <div class="box8"></div>
</body>

</html>
