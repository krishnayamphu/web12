<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            border: 2px solid red;
            margin: 15px;
            float: left;
        }

        .box1 {
            /* Permalink - use to edit and share this gradient: https://colorzilla.com/gradient-editor/#1e5799+0,2989d8+50,207cca+51,f2da82+100 */
            background: linear-gradient(to bottom, #1e5799 0%, #2989d8 50%, #207cca 51%, #f2da82 100%);
            /* W3C, IE10+, FF16+, Chrome26+, Opera12+, Safari7+ */

        }

        .box2 {
            background: linear-gradient(to bottom, #a90329 0%, #8f0222 44%, #6d0019 100%);

        }

        .box3 {
            background: linear-gradient(to bottom, #f3c5bd 0%, #e86c57 50%, #ea2803 51%, #ff6600 75%, #c72200 100%);

        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>

</html>
