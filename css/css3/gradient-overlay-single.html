<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        #hero-banner {
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url(laptop-hd-wallpaper.jpg);
            background-size: cover;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hero-banner h1 {
            font-size: 60px;
        }

        #hero-banner p {
            padding: 15px 0;
        }

        .input-group {
            padding: 8px;
            background-color: white;
            display: inline-block;
            border-radius: 5px;
        }

        .input-group input {
            padding: 8px 15px;
            border: none;
        }

        .input-group button {
            padding: 10px;
            background-color: #e84545;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <section id="hero-banner">
        <div class="row flex-column mh-100">
            <h1>Welcome to Our Website</h1>
            <p>We are team of talented designers making websites with Bootstrap</p>
            <form action="">
                <div class="input-group">
                    <input type="email" placeholder="enter email address" focused>
                    <button>Sign up</button>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
