<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        .container {
            margin: auto;
            height: 200px;
            width: 200px;
            border: 1px solid black;
        }

        .item {
            height: 100px;
            width: 100px;
            padding: 15px;
            transform: rotate(45deg);
            transform-origin: 32% 97%;
            background-color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">
            Box
        </div>
    </div>
</body>

</html>
