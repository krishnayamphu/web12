<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
        }

        div {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            float: left;
            margin: 15px;
        }

        .shadow1 {
            box-shadow: 2px 2px 2px black;
        }

        .shadow2 {
            box-shadow: -5px -5px 10px red;
        }

        .shadow3 {
            box-shadow: -5px -5px 5px 3px black;
        }

        .shadow4 {
            background-color: white;
            box-shadow: 0 0 1px green;
        }

        .shadow5 {
            background-color: white;
            box-shadow: inset 0 0 10px black;
        }

        .shadow6 {
            background-color: white;
            box-shadow: inset 0 0 10px black;
            border-radius: 50%;
        }

        .shadow7 {
            background-color: white;
            box-shadow: 0 0 10px black;
            border-radius: 50%;
        }

        .shadow8 {
            background-color: white;
            box-shadow: -5px -5px 2px red, 5px 5px 2px green;
        }

        .card {
            width: 300px;
            height: auto;
            box-shadow: 0 2px 5px #353535;
            height: 300px;
            background-color: white;
        }

        .card img {
            width: 300px;
            height: 300px;
            object-fit: cover;
        }

        .card-body {
            width: 100%;
            padding: 15px;
            margin: 0;
            height: auto;
            background-color: transparent;

        }
    </style>
</head>

<body>
    <div class="shadow1"></div>
    <div class="shadow2"></div>
    <div class="shadow3"></div>
    <div class="shadow4"></div>
    <div class="shadow5"></div>
    <div class="shadow6"></div>
    <div class="shadow7"></div>
    <div class="shadow8"></div>

    <hr style="clear: left;">

    <div class="card">
        <img src="pic.PNG" alt="">
    </div>

    <div class="card">
        <div class="card-body">
            <h1>Hello World</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Obcaecati, voluptates inventore? Asperiores
                iusto
                quidem, perspiciatis sint accusamus reiciendis vero ad similique modi, amet voluptates aperiam
                provident!
                Animi delectus expedita fuga!</p>
        </div>
    </div>
</body>

</html>
