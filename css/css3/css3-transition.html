<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
      .box1{
        width: 100px;
        height: 100px;
        background-color: red;
        transition-property: all;
        transition-duration: 2s;
        transition-timing-function: ease;
        transition-delay: 0s;
      }
      .box1:hover{
        background-color: green;
        border-radius: 50%;
      }
       .box2{
        width: 100px;
        height: 100px;
        background-color: red;
        transition-property: all;
        transition-duration: 2s;
        transition-timing-function: ease;
        transition-delay: 0s;
        margin: 15px 0;
      }
      .box2:hover{
        width: 50%;
      }
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
</body>
</html>
