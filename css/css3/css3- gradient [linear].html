<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3-gradient</title>
    <style>
        div{
            width: 200px;
            height: 100px;
            border: 1px solid green;
            float: left;
            margin: 15px;
        }
        .box1{ background-image: linear-gradient(red,blue);}
        .box2{ 
            background-image: -webkit-linear-gradient(left,red,blue);
            background-image: -moz-linear-gradient(left,red,blue);
        }
        .box3{ background-image: -webkit-linear-gradient(left top,red,blue); }
        .box4{ background-image: -webkit-linear-gradient(60deg,red,blue); }
        .box5{ background-image: -webkit-linear-gradient(left,red,yellow,blue); }
        .box6{background-image: -webkit-linear-gradient(left,rgba(255,0,0,1),rgba(0,0,255,0.5));}
        .box7{background-image: -webkit-repeating-linear-gradient(left,red, blue 10%);}
    
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
</body>
</html>
