<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        div{
            width: 400px;
            height: 400px;
            background-color: aqua;
            background-image: url('bug.jpg');
            background-repeat: no-repeat;
            margin: 10px;
            float: left;
        }
        .box-center{background-position: center;}  
        .box-bottom{background-position: 50px bottom;}  
    </style>
</head>
<body>
    <div>box</div>
    <div class="box-center">box</div>
    <div class="box-bottom">box</div>
</body>
</html>
