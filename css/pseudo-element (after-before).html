<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        h1::after {
            content: "😅😂";
        }

        p {
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }

        p::before {
            content: open-quote;
            color: red;
            font-size: 24px;
        }

        p::after {
            content: close-quote;
            color: red;
            font-size: 24px;
        }

        nav {
            background-color: aqua;
            width: 600px;
            margin: 15px;
            position: relative;
        }

        nav a {
            text-decoration: none;
            display: inline-block;
            padding: 5px 15px;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav a:hover::after {
            content: "";
            width: 50px;
            height: 2px;
            display: block;
            position: absolute;
            bottom: 0px;
            background-color: red;
        }
    </style>
</head>

<body>

    <h1>Hello World</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Animi quos libero illum fugiat repellat! Sint non
        necessitatibus culpa minus laborum autem, officia quis sed, obcaecati atque velit nam libero voluptatibus!</p>

    <hr>
    <nav>
        <a href="">Home</a>
        <a href="">About</a>
        <a href="">Contact</a>
    </nav>
</body>

</html>
