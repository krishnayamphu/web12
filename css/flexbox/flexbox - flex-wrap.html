<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .row {
            margin: 15px;
            border: 2px solid red;
            display: flex;
            width: 420px;
        }

        .col {
            padding: 15px;
            width: 200px;
            background-color: rgb(37, 111, 73);
        }

        .col:nth-child(even) {
            background-color: rgb(189, 159, 78);
        }

        .col:last-child {
            background-color: rgb(200, 91, 210);
        }

        .nowrap {
            flex-wrap: nowrap;
        }

        .wrap {
            flex-wrap: wrap;
        }

        .wrap-reverse {
            flex-wrap: wrap-reverse;
        }
    </style>
</head>

<body>
    <div class="row nowrap">
        <div class="col">col-1</div>
        <div class="col">col-2</div>
        <div class="col">col-3</div>
    </div>

    <div class="row wrap">
        <div class="col">col-1</div>
        <div class="col">col-2</div>
        <div class="col">col-3</div>
    </div>

    <div class="row wrap-reverse">
        <div class="col">col-1</div>
        <div class="col">col-2</div>
        <div class="col">col-3</div>
    </div>
</body>

</html>
