<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .row {
            margin: 15px;
            border: 2px solid red;
            display: flex;
        }

        .col {
            background-color: rgb(37, 111, 73);
        }

        .col:nth-child(even) {
            background-color: rgb(189, 159, 78);
        }

        .grow-0 {
            flex-grow: 0;
        }

        .grow-1 {
            flex-grow: 1;
        }

        .grow-2 {
            flex-grow: 2;
        }

        .grow-3 {
            flex-grow: 3;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="col grow-0">col-1</div>
        <div class="col grow-0">col-2</div>
        <div class="col grow-0">col-3</div>
    </div>

    <div class="row">
        <div class="col grow-1">col-1</div>
        <div class="col grow-1">col-2</div>
        <div class="col grow-1">col-3</div>
    </div>

    <div class="row">
        <div class="col grow-1">col-1</div>
        <div class="col grow-3">col-2</div>
        <div class="col grow-1">col-3</div>
    </div>

    <div class="row">
        <div class="col grow-1">col-1</div>
        <div class="col grow-3">col-2</div>
    </div>

    <div class="row">
        <div class="col grow-3">col-1</div>
        <div class="col grow-1">col-2</div>
    </div>

    <div class="row">
        <div class="col grow-3">col-1</div>
        <div class="col grow-1">col-2</div>
    </div>
</body>

</html>
