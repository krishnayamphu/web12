<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .row {
            margin: 15px;
            border: 2px solid red;
            display: flex;
        }

        .col {
            background-color: rgb(37, 111, 73);
        }

        .col:nth-child(even) {
            background-color: rgb(189, 159, 78);
        }

        .fb-100 {
            flex-basis: 100px;
        }

        .fb-200 {
            flex-basis: 200px;
        }

        .grow-1 {
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="col fb-100">col-1</div>
        <div class="col">col-2</div>
        <div class="col">col-3</div>
    </div>

    <div class="row">
        <div class="col fb-200">col-1</div>
        <div class="col grow-1">col-2</div>
        <div class="col shrink-1">col-3</div>
    </div>
    <div class="row">
        <div class="col fb-200">col-1</div>
        <div class="col grow-1">col-2</div>
    </div>

</body>

</html>
