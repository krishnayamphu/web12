<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{box-sizing: border-box;}
        .container{
            width: 80%;
            height: auto;
            border: 1px solid red;
            margin: 15px auto;
            display: flex;
        }
    
        .item{
            background-color: green;
            color:white;
            height: 30px;
            padding: 5px 0;
        }
        .item:nth-child(2),.item:nth-child(4){
            background-color: orange;
        }  
        .flex-basis-100{flex-basis: 100px;}     
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item flex-basis-100">Item 2</div>
        <div class="item">Item 3</div>
    </div>
    <div class="container">
        <div class="item flex-basis-100">Item 1</div>
        <div class="item flex-basis-100">Item 2</div>
        <div class="item">Item 3</div>
    </div>
</body>
</html>
