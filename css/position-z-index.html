<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
      div{
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box1{
        background-color: red;
        z-index: 1;
      }
      .box2{
        background-color: green;
        left: 50px;
        top:50px;
        z-index: 2;
      }
      .box3{
        background-color: blue;
        left: 100px;
        top:100px;
      }
       
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
</body>
</html>
