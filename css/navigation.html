<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
      nav{
        background-color: teal;
        width: 90%;
        margin: 0 auto;
        border-radius: 10px;
      }
      nav ul{
        list-style: none;
      }
      nav ul li{
        display: inline-block;
      }
      nav ul li a{
        text-decoration: none;
        padding: 15px 5px;
        display: block;
        color: white;
      }
      nav ul li a:hover{
        background-color: tomato;
      }

    </style>
</head>
<body>
   <nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Home</a></li>
        <li><a href="#">Home</a></li>
        <li><a href="#">Home</a></li>
        <li><a href="#">Home</a></li>
    </ul>
   </nav>
</body>
</html>
