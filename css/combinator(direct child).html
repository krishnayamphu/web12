<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        .container {
            border: 1px solid red;
            padding: 15px;
        }

        .article {
            border: 1px solid green;
        }

        .container>p {
            color: purple;
        }
    </style>
</head>

<body>
    <div class="container">
        <p>Paragraph 1</p>
        <div class="article">
            <p>Paragraph 2</p>
        </div>
    </div>
</body>

</html>
