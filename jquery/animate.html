<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      button {
        margin: 15px 0 0 15px;
        padding: 5px 15px;
      }

      .container {
        border: 1px solid red;
        margin: 15px 15px;
        padding: 15px;
        background-color: bisque;
        width: 200px;
      }
    </style>
  </head>

  <body>
    <button id="btn1">Animate</button>

    <div class="container">
      <p>
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. At
        perspiciatis esse numquam quis repellendus officia rerum nam, aliquam
        illum, hic tempora quae fugiat est eum corporis iusto nobis? Nobis,
        similique.
      </p>
    </div>

    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          $("div").animate(
            {
              fontSize: "20px",
              width: "400px",
              padding: "40px",
            },
            1000
          );
        });
      });
    </script>
  </body>
</html>
