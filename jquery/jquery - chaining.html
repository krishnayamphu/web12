<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <button id="btn1">Animate</button>
    <div class="box"></div>

    <script src="jquery.js"></script>
    <script>
        $(function () {
            $("#btn1").click(function () {
                $(".box").slideUp(5000).slideDown(2000).hide(1000).show(4000, function () { alert("animation complete") });
            });
        });
    </script>
</body>

</html>
