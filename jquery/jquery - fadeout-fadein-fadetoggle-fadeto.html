<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        p {
            text-align: justify;
            background-color: teal;
            padding: 8px 16px;
        }
    </style>
</head>

<body>
    <button id="btn1">FadeOut</button>
    <button id="btn2">FadeIn</button>
    <button id="btn3">FadeToggle</button>
    <button id="btn4">FadeTo</button>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nemo quidem voluptatem ea quos! Praesentium debitis
        tempora ipsa, obcaecati quos earum, nam eveniet doloremque numquam dolorem ab optio illo maxime alias!</p>

    <script src="jquery.js"></script>
    <script>
        $(function () {
            /* fadeout paragraph */
            $("#btn1").click(function () {
                $("p").fadeOut(1000);
            });

            /* fadein paragraph */
            $("#btn2").click(function () {
                $("p").fadeIn(1000);
            });

            /* fadetoggle paragraph */
            $("#btn3").click(function () {
                $("p").fadeToggle(1000);
            });

            /* fadetoggle paragraph */
            $("#btn4").click(function () {
                $("p").fadeTo(1000, 0.5);
            });
        });
    </script>
</body>

</html>
