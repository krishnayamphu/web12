<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <button id="btn1">Get Value</button>
    <button id="btn2">Set Value</button>
    <input type="text" id="txtbox" value="Aptech">


    <script src="jquery.js"></script>
    <script>
        $(function () {
            $("#btn1").click(function () {
                let data = $("#txtbox").val();
                alert(data);
            });
            $("#btn2").click(function () {
                $("#txtbox").val("Aptech computer Education");

            });
        });
    </script>
</body>

</html>
