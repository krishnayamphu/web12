<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <button id="btn1">Get Html Content</button>
    <button id="btn2">Set Html Content</button>
    <div class="container">
        <p>Hello World</p>
    </div>


    <script src="jquery.js"></script>
    <script>
        $(function () {
            $("#btn1").click(function () {
                let data = $(".container").html();
                alert(data);
            });
            $("#btn2").click(function () {
                $(".container").html("<h1>Welcome to jQuery Class</h1>");

            });
        });
    </script>
</body>

</html>
