<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        button {
            margin: 15px 0 0 15px;
            padding: 5px 15px;
        }

        .container {
            border: 1px solid red;
            margin: 15px 15px;
            padding: 15px;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <button id="btn1">Hide</button>
    <button id="btn2">Show</button>
    <button id="btn3">Toggle</button>

    <div class="container">
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. At perspiciatis esse numquam quis repellendus
            officia rerum nam, aliquam illum, hic tempora quae fugiat est eum corporis iusto nobis? Nobis, similique.
        </p>
    </div>

    <script src="jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            //hide content
            $("#btn1").click(function () {
                $("div").hide(1000);
            });

            //show content
            $("#btn2").click(function () {
                $("div").show(1000);
            });

            //toggle content
            $("#btn3").click(function () {
                $("div").toggle(1000);
            });
        });
    </script>
</body>

</html>
