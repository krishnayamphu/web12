<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            padding: 15px;
            border: 1px solid red;
            width: 300px;
            margin: 15px auto;
        }
    </style>
</head>

<body>
    <button id="btn1">Remove</button>
    <button id="btn2">Empty</button>

    <div class="container">
        <h1>Heading</h1>
        <p>Hello</p>
    </div>



    <script src="jquery.js"></script>
    <script>
        $(function () {
            $("#btn1").click(function () {
                $(".container").remove();
            });
            $("#btn2").click(function () {
                $(".container").empty();
            });
        });
    </script>
</body>

</html>
