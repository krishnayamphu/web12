<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
    <style>
        input {
            outline: none;
        }
    </style>
</head>

<body>
    <input type="text" id="tt" onkeypress="changeCase()">
    <br>
    <hr>
    <script>
        function changeCase() {
            let data = document.getElementById("tt").value;
            document.getElementById("tt").value = data.toUpperCase();
            document.getElementById("tt").style = 'border:1px solid red';

        }

        let name = "Jhon";
        document.write(name.length);
        document.write("<br>" + name.toUpperCase());
        document.write("<br>" + name.toLowerCase());
    </script>
</body>

</html>
