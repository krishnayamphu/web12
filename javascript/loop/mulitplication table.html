<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
</head>
<body>
  <script>
    var i=1; 
    var n=parseFloat(prompt("enter number:",""));
    do{
        document.write(n+" x "+i+" = "+(n*i)+"<br>");
        i++;
    }
    while(i<=10);
  </script>
</body>
</html>
