<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
</head>
<body>
    <label>Date (D-M-Y):</label>
    <select>
        <script>
            for(i=1; i<=30; i++){
                document.write("<option>"+i+"</option>");
            }
        </script>
    </select>
    
    <select>
        <script>
            for (i = 1; i <= 12; i++) {
                document.write("<option>" + i + "</option>");
            }
        </script>
    </select>

    <select>
        <script>
            for (i = 1900; i <= 2023; i++) {
                document.write("<option>" + i + "</option>");
            }
        </script>
    </select>
    
</body>
</html>
