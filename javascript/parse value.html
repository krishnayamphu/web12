<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript</title>
</head>
<body>
    <script>
        // parsing integer value
        document.write(parseInt("10"));
        document.write("<br>");
        document.write(parseInt("10.5"));
        document.write("<br>");
        document.write(parseInt("10 a"));
        document.write("<br>");
        document.write(parseInt("a10"));

        document.write("<hr>");
        // parsing floating(decimal point) value
        document.write(parseFloat("10"));
        document.write("<br>");
        document.write(parseFloat("10.5"));
        document.write("<br>");
        document.write(parseFloat("10 a"));
        document.write("<br>");
        document.write(parseFloat("a10"));

         document.write("<hr>");
        // evaluate operator
        document.write(eval("5+5"));
        document.write("<br>");
        document.write(eval("5+10/2"));
        document.write("<br>");
        document.write(eval("2+2/2"));

    </script>
</body>
</html>
