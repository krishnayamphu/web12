<!DOCTYPE html>
<html lang="en">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

<body>
    <script>
        function getDiscount(price, percentage) {
            let discount = price * (percentage / 100);
            return discount;
        }

        document.write("Discount amount: " + getDiscount(1000, 5));
    </script>
</body>
