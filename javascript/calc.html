<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript</title>
</head>
<body>
    <script>
    let n1=parseFloat(prompt("Enter N1: ",""));
    let n2 = parseFloat(prompt("Enter N2: ", ""));
    let op =prompt("Operator (+, -, *, /): ", "");
    
    switch(op){
        case "+":
            document.write("Output: "+(n1 + n2));
            break;
        case "-":
            document.write("Output: " + (n1 - n2));
            break;
        case "*":
            document.write("Output: " + (n1 * n2));
            break;
        case "/":
            document.write("Output: " + (n1 / n2));
            break;
        default:
            document.write("Invalid operators");
            break;
    }

    </script>
</body>
</html>
