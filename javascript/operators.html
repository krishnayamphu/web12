<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>

<body>

    <script>
        let a = 5;
        a--;
        document.write(a + "<br>");
        document.write(22 % 5);

        let b = 5;
        b += 3;
        document.write("<br>" + b);

        let x = 50, y = 6, z = 5;
        document.write("<br>")
        document.write(x >= y);
        document.write("<br>")
        document.write(x == z);

        document.write("<hr>")
        document.write((y > z && y > x));

        document.write("<hr>")
        document.write(y > x ? 'y is greater' : 'x is greater');
    </script>
</body>

</html>
