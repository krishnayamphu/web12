<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>

<body>
    <script>
        const num = [10, 20, 30, 40, 50];
        document.write(num[0]);
        document.write("<hr>");
        for (i = 0; i < 5; i++) {
            document.write(num[i] + "<br>");
        }

        const color = new Array("red", "green", "blue");
        for (i = 0; i < color.length; i++) {
            document.write(color[i] + "<br>");
        }

        document.write("<hr>");
        document.write(num.length)
        document.write("<br>" + color.length)

        document.write("<h3>Adding new array element</h3>");
        color.push("aqua");
        for (i = 0; i < color.length; i++) {
            document.write(color[i] + "<br>");
        }



    </script>
</body>

</html>
