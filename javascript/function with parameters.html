<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>

<body>

    <script>
        function sum(a, b) {
            document.write("Total sum : " + (a + b) + "<br>");
        }

        sum(10, 5)
        sum(10, 50)
        sum(100, 5.5)

        function stdInfo(name, contact, address) {
            document.write("Name: " + name + "<br>");
            document.write("Contact: " + contact + "<br>");
            document.write("Address: " + address + "<hr>");
        }

        stdInfo("Ram", "1234567", "Patan")
        stdInfo("Hari", "12304567", "Kumaripati")


    </script>
</body>

</html>
