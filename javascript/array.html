<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>

<body>
    <script>
        const num = [10, 20, 30, 40, 50];

        document.write(num[0]);
        document.write("<br>");
        for (i = 0; i < 5; i++) {
            document.write(num[i]);
            document.write("<br>");
        }

        const color = new Array("red", "green", "blue");
        for (i = 0; i < 3; i++) {
            document.write(color[i]);
            document.write("<br>");
        }
    </script>
</body>

</html>
