<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>

<body>

    <script>
        let temp = 40;
        if (temp >= 35) {
            // alert("It is too Hot!");
        }

        let marks = 7;
        if (marks >= 35) {
            document.write("Pass");
        }
        else {
            document.write("Fail");
        }


        document.write("<br>")
        let username = "user";
        let password = "a123";
        if (username == "admin" && password == "a123") {
            document.write("login success");
        } else {
            document.write("invalid username or password");
        }

        document.write("<hr>")
        let m = 8;
        if (m >= 90) {
            document.write("Excellent");
        } else if (m >= 75) {
            document.write("V. Good");
        } else if (m >= 60) {
            document.write("Good");
        } else if (m >= 45) {
            document.write("Satisfactory");
        } else {
            document.write("Poor");
        }


        document.write("<hr>")
        let day = 1;
        switch (day) {
            case 1:
                document.write("sun"); break;
            case 2:
                document.write("mon"); break;
            case 3:
                document.write("tue"); break;
            case 4:
                document.write("wed"); break;
            case 5:
                document.write("thu"); break;
            case 6:
                document.write("fri"); break;
            case 7:
                document.write("sat"); break;
            default:
                document.write("invalid day no."); break;
        }
        document.write("<hr>")
        let color = "blue";
        switch (color) {
            case "red":
                document.bgColor = "red"; break;
            case "green":
                document.bgColor = "green"; break;
            case "blue":
                document.bgColor = "blue"; break;
            default:
                document.write("only red, green and blue color supported");
                break;
        }


    </script>
</body>

</html>
