<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html</title>
</head>

<body>

    <h1> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Hello World</h1>
    <hr>
    <p>Paragraph syntax:
        &lt;p&gt;....&lt;/p&gt;
    </p>

    <p>copyright = &copy;</p>
    <p>registered = &reg;</p>
    <p>trademark = &trade;</p>

    <h3>Symbols</h3>
    <p>right arrow = &rarr;</p>
    <p>up arrow = &uarr;</p>
    <p>spades = &spades;</p>
    <p>spades = &hearts;</p>

</body>

</html>
