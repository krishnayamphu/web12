<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html5</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #045858;
            padding: 30px 0;

        }

        nav {
            background-color: #540b98;
            padding: 15px 0;
        }

        main {
            background-color: bisque;
        }

        .content {
            background-color: orange;
            width: 75%;
            float: left;
        }

        section {
            height: 200px;
            background-color: #bd60b8;
        }

        article {
            height: 200px;
        }

        aside {
            background-color: #61bd60;
            width: 25%;
            height: 400px;
            float: left;
        }

        footer {
            background-color: #4d2acb;
            clear: left;
            padding: 50px 0;
        }
    </style>
</head>

<body>
    <header>Header</header>
    <nav>Nav</nav>
    <main>
        <div class="content">
            <section>Section</section>
            <article>Article</article>
        </div>
        <aside>Aside</aside>
    </main>
    <footer>Footer</footer>

</body>

</html>
