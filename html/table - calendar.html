<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #747474;
        }

        .container {
            width: 400px;
            margin: 30px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th,
        td {
            padding: 10px 10px;
            text-align: center;
        }

        thead {
            color: #f27063;
        }

        tfoot {
            background-color: #ccc;
        }

        .header-table {
            border-radius: 5px 5px 0 0;
            background-color: #f27063;
        }

        .header-table th,
        .header-table td {
            border: none;
            color: white;
        }

        .big-size {
            font-size: 28px;
            padding-top: 15px;
        }

        .bg-holiday {
            background-color: #f27063;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <table class="header-table">
            <tr>
                <th>&lt;&lt;</th>
                <th class="big-size">14</th>

            </tr>
            <tr>

            </tr>
        </table>

</body>

</html>
