<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: arial;
            box-sizing: border-box;
        }
        body{
            background-color: aquamarine;
        }
        form{
            background-color: aqua;
            width: 400px;
            margin: 100px auto;
            padding: 15px;
            border-radius: 10px;
        }
        form label{
            display: block;
            margin-bottom: 5px;
            color:brown;
        }
        input{
            display: block;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid green;
            padding: 5px 10px;
            border-radius: 4px;
        }
        input[type='text']:focus{
                outline: none;
        }
        input[type='password']:focus-visible{
            outline:solid orangered;
        }
        button{
            padding: 5px 15px;
        }
    </style>
</head>
<body>
  <form action="#">
    <label>Username</label>
    <input type="text">
    <label>Password</label>
    <input type="password">
    <button>Login</button>
  </form>  
</body>
</html>
